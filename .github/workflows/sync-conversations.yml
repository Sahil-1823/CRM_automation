# Sync HeyReach conversations every 5 minutes (Hobby-safe alternative to Vercel cron).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   APP_URL      — production URL, e.g. https://your-app.vercel.app  (no trailing slash)
#   CRON_SECRET  — same value as Vercel env CRON_SECRET
#
# Manual run: Actions → "Sync conversations" → Run workflow

name: Sync conversations

on:
  schedule:
    # Every 5 minutes (GitHub may delay a few minutes under load)
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger sync-conversations endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing secrets: set APP_URL and CRON_SECRET in repo Actions secrets."
            exit 1
          fi
          # Trim trailing slash
          BASE="${APP_URL%/}"
          URL="${BASE}/api/cron/sync-conversations"
          echo "POST ${URL}"
          HTTP_CODE=$(curl -sS -o /tmp/sync-body.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --max-time 90 \
            "${URL}")
          echo "HTTP ${HTTP_CODE}"
          cat /tmp/sync-body.json || true
          echo
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "Sync failed with status ${HTTP_CODE}"
            exit 1
          fi
