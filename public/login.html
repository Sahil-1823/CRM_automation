<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · HeyReach Inbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
      <div class="w-10 h-10 rounded-lg bg-indigo-600 text-white grid place-items-center font-bold text-sm mb-5">HR</div>
      <h1 class="text-xl font-semibold text-slate-900">Admin dashboard</h1>
      <p class="text-sm text-slate-500 mt-1 mb-6">Enter the admin password to continue.</p>

      <form id="loginForm" class="space-y-4">
        <div>
          <label for="password" class="block text-xs font-medium text-slate-600 mb-1">Admin password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password"
            placeholder="••••••••"
            class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <p id="error" class="hidden text-xs text-rose-600"></p>
        <button type="submit" id="submitBtn"
          class="w-full py-2.5 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
          Enter dashboard
        </button>
      </form>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const next = params.get("next") || "/";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      const err = document.getElementById("error");
      err.classList.add("hidden");
      btn.disabled = true;
      btn.textContent = "Checking…";

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: document.getElementById("password").value }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = next;
        } else {
          err.textContent = data.error || "Incorrect admin password";
          err.classList.remove("hidden");
          btn.disabled = false;
          btn.textContent = "Enter dashboard";
        }
      } catch {
        err.textContent = "Could not connect. Try again.";
        err.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Enter dashboard";
      }
    });
  </script>
</body>
</html>
