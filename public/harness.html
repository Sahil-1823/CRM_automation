<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Harness · Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .scrollbar::-webkit-scrollbar { width: 8px; }
    .scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <header class="border-b border-slate-200 bg-white px-6 py-3 flex items-center justify-between">
    <div>
      <h1 class="text-base font-semibold">AI Harness</h1>
      <p class="text-xs text-slate-500">Test sentiment + RAG draft without HeyReach</p>
    </div>
    <div class="flex gap-2">
      <a href="/" class="text-sm px-3 py-1.5 rounded-md border border-slate-200 hover:bg-slate-100">← Inbox</a>
      <button id="runAllBtn" class="text-sm px-3 py-1.5 rounded-md bg-indigo-600 text-white hover:bg-indigo-700">Run all scenarios</button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto p-6 grid lg:grid-cols-2 gap-6">
    <!-- Custom run -->
    <section class="bg-white rounded-xl border border-slate-200 p-5 space-y-3">
      <h2 class="text-sm font-semibold">Custom test</h2>
      <input id="leadName" placeholder="Lead name" class="w-full text-sm border rounded-lg px-3 py-2" value="Test Lead" />
      <input id="companyName" placeholder="Company" class="w-full text-sm border rounded-lg px-3 py-2" />
      <textarea id="yourMessage" rows="2" placeholder="Your previous message" class="w-full text-sm border rounded-lg px-3 py-2"></textarea>
      <textarea id="replyMessage" rows="3" placeholder="Lead's reply (required)" class="w-full text-sm border rounded-lg px-3 py-2"></textarea>
      <button id="runCustomBtn" class="text-sm px-4 py-2 bg-slate-900 text-white rounded-lg hover:bg-slate-800">Run pipeline</button>
    </section>

    <!-- Scenarios list -->
    <section class="bg-white rounded-xl border border-slate-200 p-5">
      <h2 class="text-sm font-semibold mb-3">Built-in scenarios</h2>
      <div id="scenarioList" class="space-y-2 text-sm text-slate-500">Loading…</div>
    </section>

    <!-- Results -->
    <section class="lg:col-span-2 bg-white rounded-xl border border-slate-200 p-5">
      <h2 class="text-sm font-semibold mb-3">Results</h2>
      <div id="summary" class="text-xs text-slate-500 mb-3"></div>
      <pre id="output" class="text-xs bg-slate-50 border border-slate-200 rounded-lg p-4 overflow-auto max-h-[480px] scrollbar">Run a scenario to see output.</pre>
    </section>
  </main>

  <script>
    const escapeHtml = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));

    function showResult(data, label) {
      document.getElementById("summary").textContent = label || "";
      document.getElementById("output").textContent = JSON.stringify(data, null, 2);
    }

    async function loadScenarios() {
      const res = await fetch("/api/harness?action=scenarios");
      const data = await res.json();
      const list = document.getElementById("scenarioList");
      if (!data.scenarios?.length) {
        list.innerHTML = "<p>No scenarios found.</p>";
        return;
      }
      list.innerHTML = data.scenarios.map((s) => `
        <div class="flex items-center justify-between border border-slate-100 rounded-lg px-3 py-2">
          <div>
            <div class="font-medium text-slate-800">${escapeHtml(s.name)}</div>
            <div class="text-[11px] text-slate-400">${escapeHtml(s.id)}</div>
          </div>
          <button data-id="${escapeHtml(s.id)}" class="run-scenario text-xs px-2 py-1 border rounded hover:bg-slate-50">Run</button>
        </div>
      `).join("");
      list.querySelectorAll(".run-scenario").forEach((btn) => {
        btn.addEventListener("click", () => runScenario(btn.dataset.id));
      });
    }

    async function runScenario(id) {
      showResult({ status: "running…" }, `Running ${id}`);
      const res = await fetch("/api/harness?action=run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ scenarioId: id }),
      });
      const data = await res.json();
      const pass = data.evaluation?.passed;
      showResult(data, `${data.scenarioName || id} — ${pass ? "PASSED" : "FAILED"} (${data.durationMs}ms)`);
    }

    document.getElementById("runCustomBtn").addEventListener("click", async () => {
      const replyMessage = document.getElementById("replyMessage").value.trim();
      if (!replyMessage) { alert("Lead reply is required"); return; }
      showResult({ status: "running…" }, "Running custom test");
      const res = await fetch("/api/harness?action=run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          leadName: document.getElementById("leadName").value,
          companyName: document.getElementById("companyName").value,
          yourMessage: document.getElementById("yourMessage").value,
          replyMessage,
        }),
      });
      const data = await res.json();
      showResult(data, `Custom — ${data.evaluation?.passed ? "PASSED" : "DONE"} (${data.durationMs}ms)`);
    });

    document.getElementById("runAllBtn").addEventListener("click", async () => {
      const btn = document.getElementById("runAllBtn");
      btn.disabled = true;
      btn.textContent = "Running…";
      showResult({ status: "running all scenarios…" }, "Evaluating…");
      try {
        const res = await fetch("/api/harness?action=eval", { method: "POST" });
        const data = await res.json();
        showResult(data, `Eval: ${data.passed}/${data.total} passed`);
      } finally {
        btn.disabled = false;
        btn.textContent = "Run all scenarios";
      }
    });

    loadScenarios();
  </script>
</body>
</html>
