<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · HeyReach Inbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .scrollbar::-webkit-scrollbar { width: 8px; }
    .scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    .fade-in { animation: fade 0.18s ease-out; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden">
  <div class="h-full flex flex-col">
    <header class="border-b border-slate-200 bg-white px-6 py-3 flex items-center justify-between shrink-0">
      <div>
        <h1 class="text-base font-semibold">Admin dashboard</h1>
        <p class="text-xs text-slate-500">HeyReach replies · sentiment · RAG · review & send</p>
      </div>
      <div class="flex gap-2">
        <button id="logoutBtn" class="text-sm px-3 py-1.5 rounded-md border border-slate-200 hover:bg-slate-100 text-slate-600">Sign out</button>
        <button id="docsBtn" class="text-sm px-3 py-1.5 rounded-md border border-slate-200 hover:bg-slate-100">Documents</button>
        <button id="refreshBtn" class="text-sm px-3 py-1.5 rounded-md border border-slate-200 hover:bg-slate-100">Refresh</button>
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
      <aside class="w-80 border-r border-slate-200 bg-white flex flex-col">
        <div class="px-4 py-3 border-b border-slate-200 flex flex-wrap gap-1.5 text-xs">
          <button data-filter="all" class="filter-btn px-2.5 py-1 rounded-full bg-slate-900 text-white">All</button>
          <button data-filter="pending_review" class="filter-btn px-2.5 py-1 rounded-full text-slate-600 hover:bg-slate-100">Pending</button>
          <button data-filter="sent" class="filter-btn px-2.5 py-1 rounded-full text-slate-600 hover:bg-slate-100">Sent</button>
          <button data-filter="dismissed" class="filter-btn px-2.5 py-1 rounded-full text-slate-600 hover:bg-slate-100">Dismissed</button>
        </div>
        <div id="list" class="flex-1 overflow-y-auto scrollbar"></div>
      </aside>

      <main id="detail" class="flex-1 overflow-y-auto scrollbar bg-slate-50">
        <div class="h-full grid place-items-center text-slate-400 text-sm">Select a conversation to review.</div>
      </main>
    </div>
  </div>

  <!-- Documents modal -->
  <div id="docsModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg max-h-[85vh] flex flex-col">
      <div class="px-5 py-4 border-b border-slate-200 flex justify-between items-center">
        <h2 class="font-semibold">Knowledge base</h2>
        <button id="closeDocs" class="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
      </div>
      <div class="p-5 overflow-y-auto scrollbar flex-1 space-y-4">
        <p class="text-xs text-slate-500">Add product docs, pitch notes, or FAQs. Draft replies use these via RAG.</p>
        <form id="docForm" class="space-y-2">
          <input id="docTitle" type="text" placeholder="Document title" required
            class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          <textarea id="docContent" rows="5" placeholder="Paste document content…" required
            class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
          <button type="submit" class="text-sm px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Add document</button>
        </form>
        <div id="docList" class="space-y-2"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-5 right-5 bg-slate-900 text-white text-sm px-4 py-2 rounded-lg shadow-lg"></div>

  <script>
    const state = { events: [], selectedId: null, filter: "all" };

    const escapeHtml = (s) =>
      String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));

    const fmtTime = (iso) => {
      if (!iso) return "";
      const d = new Date(iso);
      const diff = (Date.now() - d.getTime()) / 1000;
      if (diff < 60) return "just now";
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return d.toLocaleDateString();
    };

    const statusBadge = (status) => {
      const map = {
        pending_review: ["bg-amber-100 text-amber-800", "Pending review"],
        sent: ["bg-emerald-100 text-emerald-800", "Sent"],
        dismissed: ["bg-slate-200 text-slate-700", "Dismissed"],
      };
      const [cls, label] = map[status] || ["bg-slate-100 text-slate-600", status];
      return `<span class="text-[11px] px-2 py-0.5 rounded-full ${cls}">${escapeHtml(label)}</span>`;
    };

    const sentimentBadge = (s) => {
      const isPos = s?.isPositive;
      const cls = isPos ? "bg-emerald-100 text-emerald-700" : "bg-rose-50 text-rose-700";
      return `<span class="text-[11px] px-2 py-0.5 rounded-full ${cls}">${escapeHtml(s?.label || "unknown")}</span>`;
    };

    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.remove("hidden");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.add("hidden"), 2400);
    }

    function renderThread(conversation) {
      if (!conversation?.length) {
        return `<p class="text-sm text-slate-400">No conversation history available.</p>`;
      }
      return conversation.map((msg) => {
        const isLead = msg.from === "lead";
        const isUs = msg.from === "us";
        const label = isLead ? "Lead" : isUs ? "You" : "Message";
        const bubble = isLead
          ? "bg-indigo-50 border-indigo-100 mr-8"
          : isUs ? "bg-white border-slate-200 ml-8" : "bg-slate-50 border-slate-200";
        return `
          <div class="mb-3">
            <div class="text-[11px] text-slate-400 mb-1">${escapeHtml(label)}</div>
            <div class="border rounded-lg p-3 text-sm whitespace-pre-wrap ${bubble}">${escapeHtml(msg.text)}</div>
          </div>`;
      }).join("");
    }

    function renderRagSources(sources) {
      if (!sources?.length) {
        return `<p class="text-xs text-slate-400">No reference documents matched.</p>`;
      }
      return sources.map((s) => `
        <div class="text-xs border border-slate-100 rounded-lg p-2 mb-2 bg-slate-50">
          <div class="font-medium text-slate-600 mb-1">${escapeHtml(s.title)}</div>
          <div class="text-slate-500 line-clamp-2">${escapeHtml(s.excerpt)}</div>
        </div>
      `).join("");
    }

    async function loadEvents() {
      const res = await fetch("/api/events?limit=200");
      const data = await res.json();
      state.events = data.events || [];
      renderList();
      if (state.selectedId) {
        const still = state.events.find((e) => e.id === state.selectedId);
        if (still) renderDetail(still);
      }
    }

    function renderList() {
      const list = document.getElementById("list");
      const filtered = state.filter === "all"
        ? state.events
        : state.events.filter((e) => e.status === state.filter);

      if (!filtered.length) {
        list.innerHTML = `<div class="p-8 text-center text-sm text-slate-400">No conversations yet.</div>`;
        return;
      }

      list.innerHTML = filtered.map((e) => {
        const lead = e.lead || {};
        const selected = e.id === state.selectedId;
        return `
          <button data-id="${e.id}" class="event-item w-full text-left px-4 py-3 border-b border-slate-100 hover:bg-slate-50 ${selected ? "bg-indigo-50/60 border-l-2 border-l-indigo-500" : ""}">
            <div class="flex justify-between gap-2 mb-1">
              <span class="font-medium text-sm truncate">${escapeHtml(lead.fullName || "Unknown")}</span>
              <span class="text-[11px] text-slate-400 shrink-0">${fmtTime(e.createdAt)}</span>
            </div>
            <div class="flex gap-1.5 mt-2">${sentimentBadge(e.sentiment)} ${statusBadge(e.status)}</div>
          </button>`;
      }).join("");

      list.querySelectorAll(".event-item").forEach((el) => {
        el.addEventListener("click", () => {
          state.selectedId = el.dataset.id;
          renderList();
          const ev = state.events.find((e) => e.id === state.selectedId);
          if (ev) renderDetail(ev);
        });
      });
    }

    function renderDetail(e) {
      const lead = e.lead || {};
      const isPending = e.status === "pending_review";
      const draftReply = e.draft?.reply || "";

      document.getElementById("detail").innerHTML = `
        <div class="max-w-2xl mx-auto p-6 space-y-5 fade-in">
          <div class="bg-white rounded-xl border border-slate-200 p-5">
            <div class="flex justify-between gap-3">
              <h2 class="text-xl font-semibold">${escapeHtml(lead.fullName || "Unknown")}</h2>
              <div class="flex gap-2">${sentimentBadge(e.sentiment)} ${statusBadge(e.status)}</div>
            </div>
            <p class="text-xs text-slate-500 mt-2">${escapeHtml(e.sentiment?.reasoning || "")}</p>
          </div>

          <div class="bg-white rounded-xl border border-slate-200 p-5">
            <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-4">Conversation</h3>
            ${renderThread(lead.conversation)}
          </div>

          <div class="bg-white rounded-xl border border-slate-200 p-5">
            <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">Reference used (RAG)</h3>
            ${renderRagSources(e.draft?.ragSources)}
          </div>

          <div class="bg-white rounded-xl border border-slate-200 p-5">
            <div class="flex justify-between mb-3">
              <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Draft reply</h3>
              ${e.draft?.rationale ? `<span class="text-[11px] text-slate-400 italic">${escapeHtml(e.draft.rationale)}</span>` : ""}
            </div>
            ${e.draft?.error ? `<p class="text-xs text-rose-600 mb-2">${escapeHtml(e.draft.error)}</p>` : ""}
            <textarea id="replyText" ${isPending ? "" : "readonly"}
              class="w-full min-h-[120px] p-3 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 ${isPending ? "" : "bg-slate-50"}"
            >${escapeHtml(draftReply)}</textarea>
            ${isPending ? `
              <div class="flex justify-end gap-2 mt-3">
                <button id="dismissBtn" class="px-3 py-2 text-sm border border-slate-200 rounded-lg hover:bg-slate-100">Dismiss</button>
                <button id="saveBtn" class="px-3 py-2 text-sm border border-slate-200 rounded-lg hover:bg-slate-100">Save</button>
                <button id="sendBtn" class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium">Send via HeyReach</button>
              </div>
            ` : e.status === "sent" ? `<p class="text-xs text-emerald-600 mt-2">✓ Sent via HeyReach ${fmtTime(e.sentAt)}</p>` : ""}
          </div>
        </div>`;

      if (isPending) {
        document.getElementById("saveBtn").addEventListener("click", () => saveDraft(e.id));
        document.getElementById("sendBtn").addEventListener("click", () => sendReply(e.id));
        document.getElementById("dismissBtn").addEventListener("click", () => dismissEvent(e.id));
      }
    }

    async function saveDraft(id) {
      const reply = document.getElementById("replyText").value;
      const res = await fetch(`/api/events?id=${encodeURIComponent(id)}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ draftReply: reply }),
      });
      toast(res.ok ? "Draft saved" : "Failed to save");
      if (res.ok) await loadEvents();
    }

    async function dismissEvent(id) {
      const res = await fetch(`/api/events?id=${encodeURIComponent(id)}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: "dismissed" }),
      });
      toast(res.ok ? "Dismissed" : "Failed");
      if (res.ok) await loadEvents();
    }

    async function sendReply(id) {
      const reply = document.getElementById("replyText").value.trim();
      if (!reply) { toast("Reply is empty"); return; }
      const btn = document.getElementById("sendBtn");
      btn.disabled = true;
      btn.textContent = "Sending…";
      try {
        const res = await fetch(`/api/send-reply?id=${encodeURIComponent(id)}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ reply }),
        });
        const data = await res.json();
        if (res.ok) {
          toast("Sent via HeyReach");
          await loadEvents();
        } else {
          toast(data.message || data.error || "Send failed");
          btn.disabled = false;
          btn.textContent = "Send via HeyReach";
        }
      } catch (err) {
        toast(err.message);
        btn.disabled = false;
        btn.textContent = "Send via HeyReach";
      }
    }

    async function loadDocuments() {
      const res = await fetch("/api/documents");
      const data = await res.json();
      const list = document.getElementById("docList");
      const docs = data.documents || [];
      if (!docs.length) {
        list.innerHTML = `<p class="text-xs text-slate-400">No documents yet.</p>`;
        return;
      }
      list.innerHTML = docs.map((d) => `
        <div class="flex justify-between items-center text-sm border border-slate-100 rounded-lg px-3 py-2">
          <div>
            <div class="font-medium">${escapeHtml(d.title)}</div>
            <div class="text-[11px] text-slate-400">${d.chunkCount} chunks · ${fmtTime(d.createdAt)}</div>
          </div>
          <button data-doc-id="${escapeHtml(d.id)}" class="delete-doc text-xs text-rose-600 hover:underline">Delete</button>
        </div>
      `).join("");
      list.querySelectorAll(".delete-doc").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (!confirm("Delete this document?")) return;
          await fetch(`/api/documents?id=${encodeURIComponent(btn.dataset.docId)}`, { method: "DELETE" });
          await loadDocuments();
        });
      });
    }

    document.getElementById("docForm").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const title = document.getElementById("docTitle").value;
      const content = document.getElementById("docContent").value;
      const res = await fetch("/api/documents", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, content }),
      });
      const data = await res.json();
      if (res.ok) {
        toast("Document added");
        document.getElementById("docForm").reset();
        await loadDocuments();
      } else {
        toast(data.message || "Failed to add document");
      }
    });

    document.getElementById("docsBtn").addEventListener("click", () => {
      document.getElementById("docsModal").classList.remove("hidden");
      loadDocuments();
    });
    document.getElementById("closeDocs").addEventListener("click", () => {
      document.getElementById("docsModal").classList.add("hidden");
    });
    document.getElementById("docsModal").addEventListener("click", (ev) => {
      if (ev.target.id === "docsModal") document.getElementById("docsModal").classList.add("hidden");
    });

    document.querySelectorAll(".filter-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        state.filter = btn.dataset.filter;
        document.querySelectorAll(".filter-btn").forEach((b) => {
          b.className = "filter-btn px-2.5 py-1 rounded-full text-slate-600 hover:bg-slate-100";
        });
        btn.className = "filter-btn px-2.5 py-1 rounded-full bg-slate-900 text-white";
        renderList();
      });
    });

    document.getElementById("refreshBtn").addEventListener("click", loadEvents);

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await fetch("/api/auth/logout", { method: "POST" });
      window.location.href = "/login.html";
    });

    loadEvents();
    setInterval(loadEvents, 15000);
  </script>
</body>
</html>
